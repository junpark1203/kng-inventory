<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K&G 실시간 재고 관리 시스템</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <img src="libraries/logo/20251208 KNG Logo_ENG.png" alt="K&G Logo" class="brand-logo">
            </div>
            <nav class="menu">
                <a href="#" class="active"><i class='bx bx-grid-alt'></i> 대시보드</a>
                <a href="#inventory"><i class='bx bx-box'></i> 재고 목록</a>
                <a href="#transactions"><i class='bx bx-list-ul'></i> 입출고 내역</a>
                <a href="#settings"><i class='bx bx-cog'></i> 환경설정</a>
            </nav>
            <div class="sidebar-footer">
                <p>Status: <span class="status online" style="color: var(--success); font-weight: 600;"><i class='bx bxl-firebase'></i> Firebase Online</span></p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div style="display: flex; gap: 20px; align-items: center;">
                    <div class="search-wrap">
                        <i class='bx bx-search'></i>
                        <input type="text" id="searchInput" placeholder="상품명 또는 바코드 검색...">
                    </div>
                    <button id="globalVatBtn" class="btn-primary" style="padding: 8px 12px; border-radius: 8px; font-weight: 600; font-size: 13px; border: none; cursor: pointer; color: white;">
                        <i class='bx bx-check-circle'></i> 부가세 포함여부 설정
                    </button>
                </div>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" alt="User">
                    <span>관리자</span>
                </div>
            </header>

            <div class="dashboard-widgets">
                <div class="widget">
                    <div class="widget-icon primary"><i class='bx bx-package'></i></div>
                    <div class="widget-info">
                        <h3>총 재고 수량</h3>
                        <p id="totalStockCount">0</p>
                    </div>
                </div>
                <div class="widget">
                    <div class="widget-icon success"><i class='bx bx-trending-up'></i></div>
                    <div class="widget-info">
                        <h3>총 매출 (출고 누적)</h3>
                        <p id="totalRevenue">₩ 0</p>
                    </div>
                </div>
                <div class="widget">
                    <div class="widget-icon warning"><i class='bx bx-shopping-bag'></i></div>
                    <div class="widget-info">
                        <h3>총 매입 (비용 누적)</h3>
                        <p id="totalCost">₩ 0</p>
                    </div>
                </div>
            </div>

            <!-- Forms Section -->
            <section class="forms-section">
                <div class="card form-card">
                    <div class="card-header">
                        <h3>입출고 등록</h3>
                        <div class="toggle-group">
                            <input type="radio" id="typeIn" name="txType" value="IN" checked>
                            <label for="typeIn" class="btn-toggle">매입 (IN)</label>
                            <input type="radio
