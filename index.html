<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="K&G 실시간 재고 관리 시스템 - 매입/매출 관리, 재고 추적, 입출고 내역 관리">
    <title>K&G 실시간 재고 관리 시스템</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- 로그인 오버레이 -->
    <div id="loginOverlay" class="login-overlay hidden">
        <div class="login-box">
            <div class="login-header">
                <img src="libraries/logo/20251208 KNG Logo_ENG.png" alt="K&G Logo" class="login-logo">
                <h2>K&G System Login</h2>
                <p>시스템 접근 권한이 필요합니다.</p>
            </div>
            <form id="loginForm">
                <div class="fg">
                    <label for="loginEmail">아이디 (이메일)</label>
                    <div class="input-icon">
                        <i class='bx bx-user'></i>
                        <input type="email" id="loginEmail" required placeholder="admin@kng.com">
                    </div>
                </div>
                <div class="fg">
                    <label for="loginPassword">비밀번호</label>
                    <div class="input-icon">
                        <i class='bx bx-lock-alt'></i>
                        <input type="password" id="loginPassword" required placeholder="••••••••">
                    </div>
                </div>
                <button type="submit" class="btn-submit" id="loginBtn" style="margin-top: 15px;">
                    로그인
                </button>
            </form>
            <div id="loginError" class="login-error hidden">아이디 또는 비밀번호가 틀렸습니다.</div>
        </div>
    </div>

    <!-- 메인 앱 (초기에는 숨김) -->
    <div class="app-container hidden" id="mainApp">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <img src="libraries/logo/20251208 KNG Logo_ENG.png" alt="K&G Logo" class="brand-logo">
            </div>
            <nav class="menu">
                <div class="menu-label">메뉴</div>
                <a href="#dashboard" class="active"><i class='bx bx-grid-alt'></i> <span>대시보드</span></a>
                <a href="#forms"><i class='bx bx-plus-circle'></i> <span>입출고 등록</span></a>
                <a href="#inventory"><i class='bx bx-box'></i> <span>재고 목록</span></a>
                <a href="#transactions"><i class='bx bx-list-ul'></i> <span>입출고 내역</span></a>
                <div class="menu-label">셀러K</div>
                <div class="menu-group" id="sellerKMenuGroup">
                    <div class="menu-group-toggle" id="sellerKToggle">
                        <i class='bx bx-store'></i>
                        <span>스마트스토어</span>
                        <i class='bx bx-chevron-down menu-arrow'></i>
                    </div>
                    <div class="menu-group-items">
                        <a href="seller-k-products.html"><i class='bx bx-receipt'></i> <span>매입상품 리스트</span></a>
                        <a href="seller-k-bbb.html"><i class='bx bx-bar-chart-alt-2'></i> <span>BBB</span></a>
                        <a href="seller-k-ccc.html"><i class='bx bx-cog'></i> <span>CCC</span></a>
                    </div>
                </div>
            </nav>
            <div class="sidebar-footer">
                <a href="#" id="logoutBtn" class="logout-btn"
