<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K&G 실시간 재고 관리 시스템</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <img src="libraries/logo/20251208 KNG Logo_ENG.png" alt="K&G Logo" class="brand-logo">
            </div>
            <nav class="menu">
                <a href="#" class="active"><i class='bx bx-grid-alt'></i> 대시보드</a>
                <a href="#inventory"><i class='bx bx-box'></i> 재고 목록</a>
                <a href="#transactions"><i class='bx bx-list-ul'></i> 입출고 내역</a>
                <a href="#settings"><i class='bx bx-cog'></i> 환경설정</a>
            </nav>
            <div class="sidebar-footer">
                <p>Status: <span class="status online" style="color: var(--success); font-weight: 600;"><i class='bx bxl-firebase'></i> Firebase Online</span></p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-wrap">
                    <i class='bx bx-search'></i>
                    <input type="text" id="searchInput" placeholder="상품명 또는 바코드 검색...">
                </div>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" alt="User">
                    <span>관리자</span>
                </div>
            </header>

            <div class="dashboard-widgets">
                <div class="widget">
                    <div class="widget-icon primary"><i class='bx bx-package'></i></div>
                    <div class="widget-info">
                        <h3>총 재고 수량</h3>
                        <p id="totalStockCount">0</p>
                    </div>
                </div>
                <div class="widget">
                    <div class="widget-icon success"><i class='bx bx-trending-up'></i></div>
                    <div class="widget-info">
                        <h3>총 매출 (출고 누적)</h3>
                        <p id="totalRevenue">₩ 0</p>
                    </div>
                </div>
                <div class="widget">
                    <div class="widget-icon warning"><i class='bx bx-shopping-bag'></i></div>
                    <div class="widget-info">
                        <h3>총 매입 (비용 누적)</h3>
                        <p id="totalCost">₩ 0</p>
                    </div>
                </div>
            </div>

            <!-- Forms Section -->
            <section class="forms-section">
                <div class="card form-card">
                    <div class="card-header">
                        <h3>입출고 등록</h3>
                        <div class="toggle-group">
                            <input type="radio" id="typeIn" name="txType" value="IN" checked>
                            <label for="typeIn" class="btn-toggle">매입 (IN)</label>
                            <input type="radio" id="typeOut" name="txType" value="OUT">
                            <label for="typeOut" class="btn-toggle">출고 (OUT)</label>
                        </div>
                    </div>
                    <form id="transactionForm" class="grid-form" autocomplete="off">
                        <!-- OUTBOUND 전용 검색 래퍼 (입고 시에는 숨김 처리) -->
                        <div class="form-group hidden" id="outboundSearchContainer">
                            <label for="outSearchInput">출고 상품 검색</label>
                            <div class="autocomplete">
                                <input type="text" id="outSearchInput" placeholder="바코드 또는 상품명, 분류 입력하여 검색...">
                            </div>
                        </div>

                        <!-- 품목 기본 정보 (IN: 자유 입력 / OUT: 읽기 전용) -->
                        <div class="form-group row-group">
                            <div class="half">
                                <label for="fSupplier">공급사</label>
                                <input type="text" id="fSupplier" required placeholder="예: 최가유통">
                            </div>
                            <div class="half">
                                <label for="fBrand">브랜드명</label>
                                <input type="text" id="fBrand" required placeholder="예: K2 세이프티">
                            </div>
                        </div>
                        
                        <div class="form-group">
                            <label for="fName">상품명</label>
                            <input type="text" id="fName" required placeholder="예: 쿨토시">
                        </div>

                        <div class="form-group row-group">
                            <div class="half">
                                <label for="fColor">컬러</label>
                                <input type="text" id="fColor" required placeholder="블랙">
                            </div>
                            <div class="half">
                                <label for="fSize">사이즈</label>
                                <input type="text" id="fSize" required placeholder="FREE">
                            </div>
                        </div>

                        <!-- 수량 및 가격 -->
                        <div class="form-group row-group">
                            <div class="half">
                                <label for="txQty">수량</label>
                                <input type="number" id="txQty" min="1" required placeholder="예: 5">
                            </div>
                            <div class="half">
                                <label for="txPrice">적용 단가 (₩)</label>
                                <input type="number" id="txPrice" min="0" required placeholder="단가 입력">
                                <small id="priceHint" class="hint">매입 단가 기준</small>
                            </div>
                        </div>

                        <!-- 부가 정보 -->
                        <div class="form-group row-group">
                            <div class="half">
                                <label for="txDate">일일 (Date)</label>
                                <input type="date" id="txDate" required>
                            </div>
                            <div class="half">
                                <label for="txRemarks">비고</label>
                                <input type="text" id="txRemarks" placeholder="특이사항, 메모 등 자유 입력">
                            </div>
                        </div>

                        <input type="hidden" id="selectedProductId">

                        <button type="submit" class="btn-primary">
                            <i class='bx bx-plus-circle'></i> 내역 등록
                        </button>
                    </form>
                </div>
            </section>

            <!-- Data Table Section -->
            <section class="table-section" id="inventory">
                <div class="card">
                    <div class="card-header">
                        <h3>실시간 재고 현황</h3>
                        <div class="header-actions">
                            <button id="deleteInvBtn" class="btn-danger"><i class='bx bx-trash'></i> 선택 삭제</button>
                            <button id="exportInventoryBtn" class="btn-success"><i class='bx bx-table'></i> 엑셀 다운로드</button>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="modern-table">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"><input type="checkbox" id="selectAllInv"></th>
                                    <th>공급사</th>
                                    <th>브랜드</th>
                                    <th>상품명</th>
                                    <th>컬러</th>
                                    <th>사이즈</th>
                                    <th>매입 단가</th>
                                    <th>매출 단가</th>
                                    <th>현재 재고</th>
                                    <th>관리</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryTableBody">
                                <!-- JS Populated -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- Data Table Section - Transactions -->
            <section class="table-section" id="transactions">
                <div class="card">
                    <div class="card-header">
                        <h3>입출고 내역</h3>
                        <div class="header-actions">
                            <button id="deleteTxBtn" class="btn-danger"><i class='bx bx-trash'></i> 선택 삭제</button>
                            <button id="exportTransactionsBtn" class="btn-success"><i class='bx bx-table'></i> 엑셀 다운로드</button>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="modern-table">
                            <thead>
                                <tr>
                                    <th style="width: 40px;"><input type="checkbox" id="selectAllTx"></th>
                                    <th>일시</th>
                                    <th>구분</th>
                                    <th>공급사</th>
                                    <th>상품명/내역</th>
                                    <th>수량</th>
                                    <th>단가</th>
                                    <th>비고</th>
                                </tr>
                            </thead>
                            <tbody id="transactionTableBody">
                                <!-- JS Populated -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
