<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K&G 셀러K — CCC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="seller-k-products.css">
</head>
<body>
    <div id="loginOverlay" class="login-overlay hidden">
        <div class="login-box">
            <div class="login-header">
                <img src="libraries/logo/20251208 KNG Logo_ENG.png" alt="K&G Logo" class="login-logo">
                <h2>K&G System Login</h2>
                <p>시스템 접근 권한이 필요합니다.</p>
            </div>
            <form id="loginForm">
                <div class="fg">
                    <label for="loginEmail">아이디 (이메일)</label>
                    <div class="input-icon"><i class='bx bx-user'></i><input type="email" id="loginEmail" required placeholder="admin@kng.com"></div>
                </div>
                <div class="fg">
                    <label for="loginPassword">비밀번호</label>
                    <div class="input-icon"><i class='bx bx-lock-alt'></i><input type="password" id="loginPassword" required placeholder="••••••••"></div>
                </div>
                <button type="submit" class="btn-submit" id="loginBtn" style="margin-top:15px;">로그인</button>
            </form>
            <div id="loginError" class="login-error hidden">아이디 또는 비밀번호가 틀렸습니다.</div>
        </div>
    </div>

    <div class="app-container hidden" id="mainApp">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="brand"><img src="libraries/logo/20251208 KNG Logo_ENG.png" alt="K&G Logo" class="brand-logo"></div>
            <nav class="menu">
                <div class="menu-label">메뉴</div>
                <a href="index.html#dashboard"><i class='bx bx-grid-alt'></i> <span>대시보드</span></a>
                <a href="index.html#forms"><i class='bx bx-plus-circle'></i> <span>입출고 등록</span></a>
                <a href="index.html#inventory"><i class='bx bx-box'></i> <span>재고 목록</span></a>
                <a href="index.html#transactions"><i class='bx bx-list-ul'></i> <span>입출고 내역</span></a>
                <div class="menu-label">셀러K</div>
                <div class="menu-group open" id="sellerKMenuGroup">
                    <div class="menu-group-toggle" id="sellerKToggle">
                        <i class='bx bx-store'></i><span>스마트스토어</span><i class='bx bx-chevron-down menu-arrow'></i>
                    </div>
                    <div class="menu-group-items">
                        <a href="seller-k-products.html"><i class='bx bx-receipt'></i> <span>매입상품 리스트</span></a>
                        <a href="seller-k-bbb.html"><i class='bx bx-bar-chart-alt-2'></i> <span>BBB</span></a>
                        <a href="seller-k-ccc.html" class="active"><i class='bx bx-cog'></i> <span>CCC</span></a>
                    </div>
                </div>
            </nav>
            <div class="sidebar-footer">
                <a href="#" id="logoutBtn" class="logout-btn"><i class='bx bx-log-out'></i> 로그아웃</a>
                <div class="connection-status"><span id="firebaseStatus" class="status"><i class='bx bx-loader-alt bx-spin'></i> 연결 중...</span></div>
            </div>
        </aside>
        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="hamburger-btn" id="hamburgerBtn" aria-label="메뉴 열기"><i class='bx bx-menu'></i></button>
                    <h2 style="font-size:14px;font-weight:600;color:var(--gray-700);margin:0;">CCC</h2>
                </div>
            </header>
            <div class="page-body">
                <div class="empty-state" style="padding:120px 20px;">
                    <i class='bx bx-hard-hat' style="font-size:64px;"></i>
                    <p style="font-size:18px;margin-top:16px;">페이지 준비 중</p>
                    <span class="hint" style="font-size:13px;">이 기능은 곧 추가될 예정입니다.</span>
                </div>
            </div>
        </main>
    </div>

    <div id="toastContainer" class="toast-container"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
        const app = initializeApp({apiKey:"AIzaSyDqdzlXTddvoBYWaVbTM7_ERO_rUGWjIgE",authDomain:"kng-inventory.firebaseapp.com",projectId:"kng-inventory",storageBucket:"kng-inventory.firebasestorage.app",messagingSenderId:"647181899026",appId:"1:647181899026:web:7cd3b62a7a10771b204fcb"});
        const auth = getAuth(app);
        onAuthStateChanged(auth, function(user) {
            document.getElementById('loginOverlay').classList.toggle('hidden', !!user);
            document.getElementById('mainApp').classList.toggle('hidden', !user);
            if (user) { var s = document.getElementById('firebaseStatus'); if(s) { s.innerHTML="<i class='bx bx-check-circle'></i> 연결됨"; s.style.color='var(--success)'; } }
        });
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value)
                .catch(function() { document.getElementById('loginError').classList.remove('hidden'); });
        });
        document.getElementById('logoutBtn').addEventListener('click', function(e) { e.preventDefault(); signOut(auth).then(function(){location.reload();}); });
        var t = document.getElementById('sellerKToggle'), g = document.getElementById('sellerKMenuGroup');
        if(t&&g) t.addEventListener('click', function(e){ e.preventDefault(); g.classList.toggle('open'); });
        var h = document.getElementById('hamburgerBtn'), s = document.getElementById('sidebar'), o = document.getElementById('sidebarOverlay');
        if(h&&s) h.addEventListener('click', function(){ s.classList.toggle('open'); if(o) o.classList.toggle('active'); });
        if(o) o.addEventListener('click', function(){ s.classList.remove('open'); o.classList.remove('active'); });
    </script>
</body>
</html>
