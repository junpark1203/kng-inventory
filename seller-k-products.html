<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="K&G 셀러K 스마트스토어 매입상품 리스트 - 매입/매출/정산 관리">
    <title>K&G 셀러K — 매입상품 리스트</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="seller-k-products.css">
</head>

<body>
    <!-- 메인 앱 -->
    <div class="app-container hidden" id="mainApp">
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <img src="libraries/logo/20251208 KNG Logo_ENG.png" alt="K&G Logo" class="brand-logo">
            </div>
            <nav class="menu">
                <div class="menu-label">메뉴</div>
                <a href="index.html#dashboard"><i class='bx bx-grid-alt'></i> <span>대시보드</span></a>
                <a href="index.html#forms"><i class='bx bx-plus-circle'></i> <span>입출고 등록</span></a>
                <a href="index.html#inventory"><i class='bx bx-box'></i> <span>재고 목록</span></a>
                <a href="index.html#transactions"><i class='bx bx-list-ul'></i> <span>입출고 내역</span></a>
                <div class="menu-label">셀러K</div>
                <div class="menu-group open" id="sellerKMenuGroup">
                    <div class="menu-group-toggle" id="sellerKToggle">
                        <i class='bx bx-store'></i>
                        <span>스마트스토어</span>
                        <i class='bx bx-chevron-down menu-arrow'></i>
                    </div>
                    <div class="menu-group-items">
                        <a href="seller-k-products.html" class="active"><i class='bx bx-receipt'></i> <span>매입상품 리스트</span></a>
                        <a href="seller-k-bbb.html"><i class='bx bx-bar-chart-alt-2'></i> <span>BBB</span></a>
                        <a href="seller-k-ccc.html"><i class='bx bx-cog'></i> <span>CCC</span></a>
                    </div>
                </div>
            </nav>
            <div class="sidebar-footer">
                <a href="#" id="logoutBtn" class="logout-btn"><i class='bx bx-log-out'></i> 로그아웃</a>
                <div class="connection-status">
                    <span id="firebaseStatus" class="status"><i class='bx bx-loader-alt bx-spin'></i> 연결 중...</span>
                </div>
            </div>
        </aside>
        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="hamburger-btn" id="hamburgerBtn" aria-label="메뉴 열기"><i class='bx bx-menu'></i></button>
                    <div class="search-wrap">
                        <i class='bx bx-search'></i>
                        <input type="text" id="searchInput" placeholder="상품명, 매입처 검색...">
                    </div>
                </div>
                <div class="topbar-right">
                    <button id="addProductBtn" class="btn-add-product"><i class='bx bx-plus-circle'></i> 신규 추가</button>
                </div>
            </header>
            <div class="page-body">
                <!-- KPI Strip -->
                <div class="kpi-strip-sk" id="dashboard">
                    <div class="kpi-card">
                        <div class="kpi-icon kpi-items"><i class='bx bx-package'></i></div>
                        <div class="kpi-data"><span class="kpi-label">총 상품 수</span><span class="kpi-value" id="kpiTotalItems">0</span></div>
                    </div>
                    <div class="kpi-card
